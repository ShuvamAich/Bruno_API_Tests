info:
  name: SubmitOrder
  type: http
  seq: 6

http:
  method: POST
  url: "{{BaseUrl}}/orders"
  body:
    type: json
    data: |-
      {
        "bookId": 3,
        "customerName": "Johnny"
      }
  auth:
    type: bearer
    token: "{{Authorization}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();  
        bru.setEnvVar("OrderId", data.orderId, { persist: false });
    - type: tests
      code: bru.setNextRequest("Order")
  assertions:
    - expression: res.status
      operator: eq
      value: "201"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
