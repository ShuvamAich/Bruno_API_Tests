info:
  name: UpdateOrder
  type: http
  seq: 12

http:
  method: PATCH
  url: "{{BaseUrl}}/orders/:orderId"
  params:
    - name: orderId
      value: "{{OrderId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "customerName": "Justin"
      }
  auth:
    type: bearer
    token: "{{Authorization}}"

runtime:
  scripts:
    - type: tests
      code: bru.setNextRequest("VerifyUpdate")
  assertions:
    - expression: res.status
      operator: eq
      value: "204"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
